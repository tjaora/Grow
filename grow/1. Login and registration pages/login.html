<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Grow</title>
  <link rel="stylesheet" href="style.css">
</head>

<body id="bg">
  <div class="hero" aria-hidden="true"></div>

  <div class="form-box">

    
    <h2 class="form-title">Log In to Your Account</h2>

    <!-- Social sign-in icons -->
    <div class="social-icons">
      
      <img src="images/f.png"  alt="Sign in with Facebook">
      <img src="images/tw.png" alt="Sign in with Twitter">
      <img src="images/gp.png" alt="Sign in with Google">
    </div>

    <form action="" method="post" id="login" class="input-group">
      
      <label for="username" class="sr-only">User ID</label>
      <input
        id="username"
        type="text"
        name="username"
        class="input-field"
        placeholder="User ID"
        required
        autocomplete="username"
      >

      <label for="password" class="sr-only">Password</label>
      <input
        id="password"
        type="password"
        name="password"
        class="input-field"
        placeholder="Enter Password"
        required
        autocomplete="current-password"
      >

      
      <button type="submit" class="submit-btn">Log In</button>

      <a href="register.html" class="form-link">
        Not registered? Click here to sign up.
      </a>
    </form>

  </div>
</body>
</html>
