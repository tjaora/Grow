<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Grow</title>
  <link rel="stylesheet" href="style.css">
</head>

<body id="bg">
  <div class="hero" aria-hidden="true"></div>

  <div class="form-box">
    <h2 class="form-title">Create an Account</h2>

    <div class="social-icons">
      <img src="images/f.png"  alt="Sign up with Facebook">
      <img src="images/tw.png" alt="Sign up with Twitter">
      <img src="images/gp.png" alt="Sign up with Google">
    </div>

    
    <form action="" method="post" class="input-group">
      {% csrf_token %}

      <label for="reg-username" class="sr-only">User ID</label>
      <input
        id="reg-username"
        type="text"
        name="username"
        class="input-field"
        placeholder="User ID"
        required
        autocomplete="username"
      >

      <label for="reg-email" class="sr-only">Email Address</label>
      <input
        id="reg-email"
        type="email"
        name="email"
        class="input-field"
        placeholder="Email Address"
        required
        autocomplete="email"
      >

      <label for="reg-pass1" class="sr-only">Password</label>
      <input
        id="reg-pass1"
        type="password"
        name="password1"
        class="input-field"
        placeholder="Enter Password"
        required
        autocomplete="new-password"
      >

      <label for="reg-pass2" class="sr-only">Confirm Password</label>
      <input
        id="reg-pass2"
        type="password"
        name="password2"
        class="input-field"
        placeholder="Confirm Password"
        required
        autocomplete="new-password"
      >

     <button type="submit" class="submit-btn">Register</button>

      <a href="login.html" class="form-link">
        Already have an account? Log in.
      </a>
    </form>

  </div>
</body>
</html>
